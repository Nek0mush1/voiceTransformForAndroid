<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text Correction Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fa;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #64748b;
        --line: #d8dee8;
        --primary: #1769aa;
        --primary-dark: #0f4c81;
        --accent: #108060;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      }

      .page {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 40px;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      .language-toggle {
        display: inline-flex;
        flex-shrink: 0;
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .language-toggle button {
        min-width: 84px;
        border: 0;
        border-radius: 6px;
        padding: 9px 12px;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 14px;
        cursor: pointer;
      }

      .language-toggle button.active {
        background: var(--primary);
        color: #ffffff;
        font-weight: 600;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(300px, 420px);
        gap: 20px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .panel-header {
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      .panel-header h2 {
        margin: 0;
        font-size: 18px;
        line-height: 1.3;
      }

      .panel-body {
        padding: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--text);
        font: inherit;
        font-size: 15px;
      }

      textarea {
        min-height: 164px;
        resize: vertical;
        padding: 12px 14px;
        line-height: 1.6;
      }

      input,
      select {
        height: 42px;
        padding: 0 12px;
      }

      .fields {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 16px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 18px;
      }

      .primary-action {
        border: 0;
        border-radius: 8px;
        padding: 11px 18px;
        background: var(--primary);
        color: #ffffff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .primary-action:hover {
        background: var(--primary-dark);
      }

      .primary-action:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
      }

      .status.error {
        color: var(--danger);
      }

      .result-block {
        display: grid;
        gap: 14px;
      }

      .result-item {
        padding-bottom: 14px;
        border-bottom: 1px solid var(--line);
      }

      .result-item:last-child {
        padding-bottom: 0;
        border-bottom: 0;
      }

      .result-label {
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .result-value {
        min-height: 24px;
        font-size: 16px;
        line-height: 1.5;
        word-break: break-word;
      }

      .corrected {
        color: var(--accent);
        font-weight: 700;
      }

      .terms {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .term {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 8px;
        padding: 4px 9px;
        background: #e9f6f1;
        color: #0d6b50;
        font-size: 14px;
        font-weight: 600;
      }

      .api-link {
        color: var(--primary);
        text-decoration: none;
      }

      .api-link:hover {
        text-decoration: underline;
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 24px, 1040px);
          padding-top: 20px;
        }

        header {
          flex-direction: column;
        }

        h1 {
          font-size: 26px;
        }

        main {
          grid-template-columns: 1fr;
        }

        .fields {
          grid-template-columns: 1fr;
        }

        .language-toggle {
          width: 100%;
        }

        .language-toggle button {
          flex: 1;
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div>
          <h1 data-i18n="title">文本纠错演示</h1>
          <p class="subtitle" data-i18n="subtitle">
            输入语音识别后的文本，后端会根据专业词库修正常见误识别。
          </p>
        </div>
        <div class="language-toggle" aria-label="Language">
          <button type="button" id="langZh" class="active">中文</button>
          <button type="button" id="langEn">English</button>
        </div>
      </header>

      <main>
        <section class="panel" aria-labelledby="inputTitle">
          <div class="panel-header">
            <h2 id="inputTitle" data-i18n="inputTitle">输入</h2>
          </div>
          <div class="panel-body">
            <label for="rawText" data-i18n="rawText">原始文本</label>
            <textarea id="rawText">今天上午上了两节祭祖课</textarea>

            <div class="fields">
              <div>
                <label for="userId" data-i18n="userId">用户 ID</label>
                <input id="userId" value="local_user" />
              </div>
              <div>
                <label for="appContext" data-i18n="appContext">应用场景</label>
                <select id="appContext">
                  <option value="chat" data-i18n="contextChat">聊天</option>
                  <option value="note" data-i18n="contextNote">笔记</option>
                  <option value="study" data-i18n="contextStudy">学习</option>
                </select>
              </div>
            </div>

            <div class="actions">
              <button type="button" class="primary-action" id="correctButton" data-i18n="correctButton">
                开始纠错
              </button>
              <span class="status" id="statusText" data-i18n="ready">准备就绪</span>
            </div>
          </div>
        </section>

        <section class="panel" aria-labelledby="resultTitle">
          <div class="panel-header">
            <h2 id="resultTitle" data-i18n="resultTitle">结果</h2>
          </div>
          <div class="panel-body result-block">
            <div class="result-item">
              <div class="result-label" data-i18n="correctedText">纠错结果</div>
              <div class="result-value corrected" id="correctedText">今天上午上了两节计组课</div>
            </div>
            <div class="result-item">
              <div class="result-label" data-i18n="matchedTerms">命中术语</div>
              <div class="result-value terms" id="matchedTerms">
                <span class="term">计组</span>
              </div>
            </div>
            <div class="result-item">
              <div class="result-label" data-i18n="reason">原因</div>
              <div class="result-value" id="reasonText">根据用户专业词库和同音匹配修正。</div>
            </div>
            <div class="result-item">
              <div class="result-label" data-i18n="apiDocs">接口文档</div>
              <div class="result-value">
                <a class="api-link" href="/docs" data-i18n="openDocs">打开 FastAPI 文档</a>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const translations = {
        zh: {
          title: "文本纠错演示",
          subtitle: "输入语音识别后的文本，后端会根据专业词库修正常见误识别。",
          inputTitle: "输入",
          rawText: "原始文本",
          userId: "用户 ID",
          appContext: "应用场景",
          contextChat: "聊天",
          contextNote: "笔记",
          contextStudy: "学习",
          correctButton: "开始纠错",
          ready: "准备就绪",
          correcting: "纠错中...",
          done: "已完成",
          failed: "请求失败，请确认后端服务正在运行。",
          resultTitle: "结果",
          correctedText: "纠错结果",
          matchedTerms: "命中术语",
          reason: "原因",
          emptyTerms: "无",
          apiDocs: "接口文档",
          openDocs: "打开 FastAPI 文档",
        },
        en: {
          title: "Text Correction Demo",
          subtitle: "Enter speech-recognized text and the backend will correct common domain-term mistakes.",
          inputTitle: "Input",
          rawText: "Raw Text",
          userId: "User ID",
          appContext: "App Context",
          contextChat: "Chat",
          contextNote: "Notes",
          contextStudy: "Study",
          correctButton: "Correct",
          ready: "Ready",
          correcting: "Correcting...",
          done: "Completed",
          failed: "Request failed. Make sure the backend service is running.",
          resultTitle: "Result",
          correctedText: "Corrected Text",
          matchedTerms: "Matched Terms",
          reason: "Reason",
          emptyTerms: "None",
          apiDocs: "API Docs",
          openDocs: "Open FastAPI Docs",
        },
      };

      let currentLanguage = "zh";

      const elements = {
        langZh: document.getElementById("langZh"),
        langEn: document.getElementById("langEn"),
        rawText: document.getElementById("rawText"),
        userId: document.getElementById("userId"),
        appContext: document.getElementById("appContext"),
        correctButton: document.getElementById("correctButton"),
        statusText: document.getElementById("statusText"),
        correctedText: document.getElementById("correctedText"),
        matchedTerms: document.getElementById("matchedTerms"),
        reasonText: document.getElementById("reasonText"),
      };

      function t(key) {
        return translations[currentLanguage][key];
      }

      function setLanguage(language) {
        currentLanguage = language;
        document.documentElement.lang = language === "zh" ? "zh-CN" : "en";
        elements.langZh.classList.toggle("active", language === "zh");
        elements.langEn.classList.toggle("active", language === "en");

        document.querySelectorAll("[data-i18n]").forEach((node) => {
          const key = node.getAttribute("data-i18n");
          if (translations[language][key]) {
            node.textContent = translations[language][key];
          }
        });

        if (!elements.statusText.classList.contains("error")) {
          elements.statusText.textContent = t("ready");
        }

        if (elements.matchedTerms.dataset.empty === "true") {
          renderTerms([]);
        }
      }

      function renderTerms(terms) {
        elements.matchedTerms.innerHTML = "";
        elements.matchedTerms.dataset.empty = String(terms.length === 0);

        if (terms.length === 0) {
          elements.matchedTerms.textContent = t("emptyTerms");
          return;
        }

        terms.forEach((term) => {
          const span = document.createElement("span");
          span.className = "term";
          span.textContent = term;
          elements.matchedTerms.appendChild(span);
        });
      }

      async function correctText() {
        elements.statusText.classList.remove("error");
        elements.statusText.textContent = t("correcting");
        elements.correctButton.disabled = true;

        try {
          const response = await fetch("/api/v1/correct-text", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              user_id: elements.userId.value.trim() || "local_user",
              raw_text: elements.rawText.value.trim(),
              app_context: elements.appContext.value,
            }),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          elements.correctedText.textContent = data.corrected_text;
          elements.reasonText.textContent = data.reason;
          renderTerms(data.matched_terms || []);
          elements.statusText.textContent = t("done");
        } catch (error) {
          elements.statusText.textContent = t("failed");
          elements.statusText.classList.add("error");
        } finally {
          elements.correctButton.disabled = false;
        }
      }

      elements.langZh.addEventListener("click", () => setLanguage("zh"));
      elements.langEn.addEventListener("click", () => setLanguage("en"));
      elements.correctButton.addEventListener("click", correctText);
      setLanguage("zh");
    </script>
  </body>
</html>
